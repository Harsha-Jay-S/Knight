name: Knight Maintains the Queen

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Knight repo (config + plan files)
        uses: actions/checkout@v4
        with:
          repository: Harsha-Jay-S/Knight
          token: ${{ secrets.GH_PAT }}
          path: knight

      - name: Checkout W.O.M.A.N (v2-maintained cumulative, fallback Queen)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone https://github.com/Harsha-Jay-S/W.O.M.A.N.git woman --quiet
          cd woman
          if git ls-remote --tags origin v2-maintained 2>/dev/null | grep -q .; then
            git fetch origin +refs/tags/v2-maintained:refs/tags/v2-maintained
            git checkout v2-maintained
            echo "Baseline: v2-maintained (cumulative)"
          else
            git checkout Queen
            echo "Baseline: Queen (fresh — first cycle)"
          fi

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        working-directory: woman
        run: |
          pip install --upgrade pip
          pip install -e ".[test,ui]" 2>/dev/null || pip install pytest pytest-cov pytest-mock rich questionary

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Configure opencode for DeepSeek V4 Flash Free
        run: |
          mkdir -p ~/.config/opencode
          cp knight/opencode-config.json ~/.config/opencode/opencode.json

      - name: Copy maintenance plan
        run: cp knight/maintenance-plan.yaml woman/

      - name: Phase 0 — Pre-flight health check
        working-directory: woman
        run: |
          echo "=== Pre-flight health check ==="
          echo "--- Python files at root ---"
          ls *.py
          echo "--- Tests directory ---"
          ls tests/
          echo "--- Package import ---"
          python -c "import woman_revamp; print('OK: woman_revamp importable')" 2>&1 || echo "WARN: not directly importable"
          echo "--- Test runner ---"
          python -m pytest --version
          echo "--- Key deps ---"
          pip list 2>/dev/null | grep -iE "pytest|rich|questionary|pytest-cov" || echo "(none found)"
          echo "=== Pre-flight passed ==="

      - name: Phase 1 — Analyze codebase
        working-directory: woman
        run: |
          python -m pytest tests/ -v --tb=short > /tmp/test_baseline.txt 2>&1 || true
          cat /tmp/test_baseline.txt

      - name: Phase 2 — Plan maintenance
        timeout-minutes: 10
        working-directory: woman
        run: |
          opencode run --model opencode/deepseek-v4-flash-free "$(cat maintenance-plan.yaml)

          ANALYSIS ONLY — do NOT make any edits to files.
          This phase is for reading, analyzing, and planning only.
          Speed is critical — you have 10 minutes max.
          If you can't finish, focus on the top 3 most critical issues only.

          Quickly skim these key files for bugs and gaps:
          cli.py, engine.py, ui.py, config.py, context.py, bootstrap.py
          Then check tests/*.py for coverage holes.
          Do NOT read every file — focus on bug-prone and low-coverage areas.

          This directory IS the woman_revamp CLI package
          (it was installed via pip install -e . — there is no woman_revamp/ subdirectory).

          Write a prioritized maintenance plan to plan.md"

      - name: Phase 3 — Build fixes
        timeout-minutes: 10
        working-directory: woman
        run: |
          opencode run --model opencode/deepseek-v4-flash-free "$(cat maintenance-plan.yaml)

          $(cat plan.md 2>/dev/null || echo "(no plan file — proceed with maintenance-plan.yaml rules)")

          BUILD ONLY — fix ONLY the issues listed in plan.md.
          Do NOT add scope beyond what's in the plan.

          Execute the maintenance plan at plan.md.
          Fix all identified issues.
          Add missing tests.
          Improve error handling and documentation."

      - name: Phase 4 — Verify with tests
        working-directory: woman
        run: |
          set -o pipefail
          # woman_revamp is an implicit package (source at repo root, not in a subdirectory)
          # Create a symlink so 'import woman_revamp' resolves to the current directory
          mkdir -p /tmp/pylink
          ln -sf "$PWD" /tmp/pylink/woman_revamp
          PYTHONPATH=/tmp/pylink:$PYTHONPATH python -m pytest tests/ -v --tb=short --cov=. 2>&1 | tee /tmp/test_final.txt
          echo "--- Coverage summary ---"
          grep -E "^TOTAL|^---" /tmp/test_final.txt || echo "(no coverage line found)"

      - name: Phase 4 — Scope check
        working-directory: woman
        run: |
          CHANGED=$(git diff --name-only | wc -l)
          LINES=$(git diff --stat | tail -1 | grep -oP '\d+(?= insertions?(?!\.))' || echo 0)
          echo "Files changed: $CHANGED  |  Lines added: $LINES"
          if [ "$CHANGED" -gt 5 ]; then
            echo ":warning: WARNING: Changed $CHANGED files (max 5 per boundaries)"
          fi
          if [ "$LINES" -gt 300 ]; then
            echo ":warning: WARNING: Added $LINES lines (max 300 per boundaries)"
          fi

      - name: Phase 5 — Commit, tag, and push v2-maintained
        working-directory: woman
        run: |
          git config user.name "Knight Maintenance Agent"
          git config user.email "knight@woman-cli.dev"

          if ! git diff --quiet; then
            git add -A
            SUMMARY=$(git diff --cached --shortstat)
            git commit -m "maintenance: $(date -u '+%Y-%m-%d %H:%M UTC') — $SUMMARY"
            echo "Changes committed"
          else
            echo "No changes this cycle"
          fi

          git tag -f v2-maintained
          git tag "v2-maintained-$(date -u '+%Y-%m-%d')"
          set +x  # hide token from debug logs
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/Harsha-Jay-S/W.O.M.A.N.git
          set -x  # re-enable logging
          git push origin --force refs/tags/v2-maintained
          git push origin "refs/tags/v2-maintained-$(date -u '+%Y-%m-%d')"
          echo "Pushed v2-maintained  : $(git rev-parse HEAD)"
          echo "Pushed dated tag      : v2-maintained-$(date -u '+%Y-%m-%d')"
